<template>
  <template if:true={isComposerVariant}>
    <div class="file-manager file-manager_composer">
      <template if:true={renderComposerUpload}>
        <lightning-file-upload
          label="Attach Files"
          name="fileUpload"
          record-id={recordId}
          accept={acceptedFormats}
          field-level-help={uploadHelpText}
          onuploadfinished={handleComposerUploadFinished}
          multiple
        >
        </lightning-file-upload>
      </template>
      <template if:true={hasPendingComposerFiles}>
        <div class="slds-m-top_small">
          <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small">Files to Upload</div>
          <c-portal-file-attachments
            files={pendingComposerFiles}
            show-preview={showPreview}
            show-download={showDownload}
            show-delete={showDelete}
            onfileremove={handleComposerFileRemove}
          >
          </c-portal-file-attachments>
        </div>
      </template>
    </div>
  </template>

  <template if:false={isComposerVariant}>
    <div class={wrapperClass}>
      <template if:true={showCard}>
        <div class="slds-card__header slds-grid">
          <header class="slds-media slds-media_center slds-has-flexi-truncate">
            <div class="slds-media__body">
              <h2 class="slds-card__header-title">
                <span>{cardTitle}</span>
              </h2>
            </div>
          </header>
        </div>
      </template>
      <div class={innerBodyClass}>
        <template if:true={showRecordUpload}>
          <lightning-file-upload
            label="Upload Files"
            name="fileUploadRecord"
            record-id={recordId}
            accept={acceptedFormats}
            onuploadfinished={handleRecordUploadFinished}
            multiple
          >
          </lightning-file-upload>
        </template>
        <template if:true={hasDisplayFiles}>
          <div class={listSpacingClass}>
            <c-portal-file-attachments
              files={displayFileRows}
              show-preview={showPreview}
              show-download={showDownload}
              show-delete={showDelete}
            >
            </c-portal-file-attachments>
          </div>
        </template>
        <template if:true={showEmptyRecordHint}>
          <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">No files yet.</p>
        </template>
      </div>
    </div>
  </template>
</template>
