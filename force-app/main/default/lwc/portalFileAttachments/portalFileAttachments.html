<template>
  <template if:true={hasFiles}>
    <ul class="portal-file-list slds-list_vertical slds-has-dividers_bottom-space">
      <template for:each={displayFiles} for:item="file">
        <li key={file.rowKey} class="portal-file-row slds-item">
          <div
            class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-box slds-box_x-small slds-theme_shade"
          >
            <div class="slds-col slds-grow slds-grid slds-grid_vertical-align-start portal-file-name-col">
              <lightning-icon
                icon-name={file.iconName}
                size="small"
                class="slds-m-right_small slds-m-top_xx-small portal-file-icon"
              ></lightning-icon>
              <div class="portal-file-main">
                <div class="portal-file-title-line" title={file.fullName}>
                  <div class="portal-file-title-text">
                    <template if:true={showPreview}>
                    <a
                      href="javascript:void(0);"
                      class="slds-text-link portal-file-title-link"
                      data-document-id={file.contentDocumentId}
                      data-version-id={file.contentVersionId}
                      data-preview-title={file.fullName}
                      onclick={handlePreviewClick}
                    >
                        {file.title}
                      </a>
                    </template>
                    <template if:false={showPreview}>
                      <span class="slds-text-body_small portal-file-title-plain">{file.title}</span>
                    </template>
                  </div>
                  <template if:true={file.fileExtension}>
                    <span class="slds-text-body_small slds-text-color_weak portal-file-title-ext"
                      >.{file.fileExtension}</span
                    >
                  </template>
                </div>
                <template if:true={file.showMetaLine}>
                  <div class="portal-file-meta slds-text-body_small slds-text-color_weak" title={file.metaLine}>
                    {file.metaLine}
                  </div>
                </template>
              </div>
            </div>
            <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center">
              <template if:true={file.showDeleteRow}>
                <lightning-button-icon
                  icon-name="utility:delete"
                  variant="border-filled"
                  alternative-text="Remove"
                  title="Remove"
                  data-document-id={file.contentDocumentId}
                  data-version-id={file.contentVersionId}
                  onclick={handleRemoveClick}
                  class="slds-m-left_xx-small"
                >
                </lightning-button-icon>
              </template>
            </div>
          </div>
        </li>
      </template>
    </ul>
  </template>
</template>
