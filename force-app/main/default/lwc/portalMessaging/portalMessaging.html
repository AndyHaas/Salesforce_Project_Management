<template>
  <template if:true={showHeaderEnabled}>
    <lightning-card class="messaging-card">
      <!-- Header Actions (Search) -->
      <div slot="actions" class="slds-grid slds-grid_vertical-align-center">
        <template if:true={showMessageSearch}>
          <div class="slds-form-element slds-m-right_small">
            <div class="slds-form-element__control">
              <lightning-input
                type="text"
                value={messageSearchTerm}
                onchange={handleMessageSearchChange}
                placeholder="Search messages..."
                class="message-search-input"
              >
              </lightning-input>
            </div>
          </div>
          <lightning-button-icon
            icon-name="utility:close"
            variant="border-filled"
            alternative-text="Close search"
            title="Close search"
            onclick={handleClearSearch}
            class="slds-m-right_x-small"
          >
          </lightning-button-icon>
        </template>

        <template if:false={showMessageSearch}>
          <span class="slds-text-body_small slds-text-color_weak slds-m-right_small" title="Message count">
            {messageCount} {messageCountText}
          </span>
          <template if:true={showPinnedPanelChrome}>
            <lightning-button-icon
              icon-name="utility:preview"
              variant={pinnedToggleVariant}
              alternative-text="Toggle pinned messages panel"
              title={pinnedToggleTitle}
              onclick={handleTogglePinnedSection}
              class="slds-m-right_x-small pinned-preview-toggle"
            >
            </lightning-button-icon>
          </template>
          <lightning-button-icon
            icon-name="utility:search"
            variant="border-filled"
            alternative-text="Search messages"
            title="Search messages"
            onclick={handleToggleSearch}
            class="search-toggle-button"
          >
          </lightning-button-icon>
        </template>
      </div>

      <div class="slds-card__body slds-card__body_inner">
        <!-- Context Display -->
        <template if:true={contextInfo}>
          <div class="context-display slds-m-bottom_medium">
            <lightning-icon icon-name={contextIcon} size="small" class="slds-m-right_x-small"> </lightning-icon>
            <div class="context-text">
              <div class="slds-text-heading_small slds-text-color_weak">
                Viewing: <strong>{contextType} Messages</strong>
              </div>
              <div class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">{contextDisplayText}</div>
            </div>
          </div>
        </template>

        <template if:true={showPinnedSectionBody}>
          <div class="pinned-messages-panel slds-box slds-box_x-small slds-theme_shade slds-m-bottom_small">
            <div class="slds-media slds-m-bottom_small pinned-messages-panel__header">
              <div class="slds-media__figure">
                <lightning-icon icon-name="utility:pinned" size="x-small" class="pinned-icon"> </lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Pinned Messages</span>
                <p
                  class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small pinned-messages-panel__subtitle"
                >
                  Click a row to scroll to it in the thread
                </p>
              </div>
            </div>
            <ul class="pinned-messages-list">
              <template for:each={pinnedMessagesCompact} for:item="message">
                <li key={message.id} class="pinned-messages-list__item">
                  <div class="pinned-compact-row" data-message-id={message.id} onclick={handleScrollToMessageInThread}>
                    <div class="pinned-compact-row__main">
                      <span class="pinned-compact-row__sender"> {message.displaySenderName} </span>
                      <span class="slds-text-body_small slds-text-color_weak slds-m-left_x-small">
                        {message.formattedDate}
                      </span>
                    </div>
                    <div class="slds-text-body_small slds-text-color_weak slds-truncate pinned-compact-row__preview">
                      {message.bodyPreview}
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </div>
        </template>

        <!-- Messages List -->
        <div class="messages-list" onscroll={handleScroll}>
          <template if:true={hasMessages}>
            <template if:true={hasFilteredMessages}>
              <!-- Loading indicator for infinite scroll (at top for reverse chronological) -->
              <template if:true={isLoadingMore}>
                <div class="slds-align_absolute-center slds-p-around_medium">
                  <lightning-spinner alternative-text="Loading older messages" size="small"></lightning-spinner>
                  <span class="slds-m-left_small slds-text-body_small slds-text-color_weak"
                    >Loading older messages...</span
                  >
                </div>
              </template>

              <!-- End of messages indicator (at top for reverse chronological) -->
              <template if:false={hasMoreMessages}>
                <div class="slds-align_absolute-center slds-p-around_medium">
                  <span class="slds-text-body_small slds-text-color_weak">No older messages to load</span>
                </div>
              </template>

              <template for:each={messages} for:item="message">
                <div
                  key={message.id}
                  class="message-item"
                  class:message-unread={message.isUnread}
                  class:message-mentioned={message.isMentioned}
                  class:message-pinned={message.isPinned}
                  data-message-id={message.id}
                >
                  <div class="message-header">
                    <div class="message-sender">
                      <template if:true={message.isPinned}>
                        <lightning-icon
                          icon-name="utility:pinned"
                          size="xx-small"
                          class="slds-m-right_xx-small pinned-icon"
                          title="Pinned"
                        >
                        </lightning-icon>
                      </template>

                      <strong>{message.displaySenderName}</strong>

                      <template if:true={message.isMentioned}>
                        <lightning-badge label="Mentioned" variant="warning" class="slds-m-left_x-small">
                        </lightning-badge>
                      </template>

                      <template if:true={isMilestoneTeamMember}>
                        <template if:true={message.isInternalMessage}>
                          <lightning-badge
                            label="Internal"
                            variant="warning"
                            class="slds-m-left_x-small"
                            title="Not visible to clients"
                          >
                          </lightning-badge>
                        </template>
                      </template>
                    </div>

                    <div class="message-meta">
                      <div class="message-meta__time">
                        <span class="slds-text-body_small"> {message.formattedDate} </span>
                        <template if:false={message.isRead}>
                          <lightning-badge label="New" variant="inverse" class="slds-m-left_x-small badge-new">
                          </lightning-badge>
                        </template>
                      </div>

                      <template if:true={message.isEdited}>
                        <div class="message-meta__edited">
                          <span
                            class="slds-text-body_small slds-text-color_weak slds-m-left_x-small"
                            title={message.formattedEditedDate}
                          >
                            (edited {message.formattedEditedDate})
                          </span>
                        </div>
                      </template>

                      <template if:false={message.isEditing}>
                        <div class="message-actions">
                          <lightning-button-group>
                            <lightning-button-icon
                              icon-name="utility:reply"
                              variant="border-filled"
                              alternative-text="Reply to message"
                              title="Reply to message"
                              data-message-id={message.id}
                              onclick={handleReplyToMessage}
                              class="reply-button"
                            >
                            </lightning-button-icon>

                            <template if:true={message.showOverflowActions}>
                              <lightning-button-menu
                                alternative-text="More message actions"
                                title="More actions"
                                icon-name="utility:down"
                                variant="border-filled"
                                menu-alignment="right"
                                data-message-id={message.id}
                                onselect={handleMessageActionMenuSelect}
                                class="message-overflow-menu"
                              >
                                <template if:true={message.isFromCurrentUser}>
                                  <lightning-menu-item
                                    value="edit"
                                    label="Edit message"
                                    prefix-icon-name="utility:edit"
                                  >
                                  </lightning-menu-item>
                                </template>
                                <template if:true={message.isFromCurrentUser}>
                                  <lightning-menu-item
                                    value="delete"
                                    label="Delete message"
                                    prefix-icon-name="utility:delete"
                                  >
                                  </lightning-menu-item>
                                </template>
                                <template if:true={isMilestoneTeamMember}>
                                  <template if:true={message.isPinned}>
                                    <lightning-menu-item
                                      value="unpin"
                                      label="Unpin message"
                                      prefix-icon-name="utility:pinned"
                                    >
                                    </lightning-menu-item>
                                  </template>
                                  <template if:false={message.isPinned}>
                                    <lightning-menu-item value="pin" label="Pin message" prefix-icon-name="utility:pin">
                                    </lightning-menu-item>
                                  </template>
                                </template>
                              </lightning-button-menu>
                            </template>
                          </lightning-button-group>
                        </div>
                      </template>
                    </div>
                  </div>

                  <!-- Reply To Indicator -->
                  <template if:true={message.replyToMessageId}>
                    <div class="reply-to-indicator slds-m-bottom_x-small">
                      <div class="slds-box slds-box_x-small slds-theme_shade">
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                          <div class="slds-col">
                            <lightning-icon icon-name="utility:reply" size="xx-small" class="slds-m-right_xx-small">
                            </lightning-icon>
                            <span class="slds-text-body_small">
                              In reply to
                              <strong>{message.replyToSenderName}</strong>
                              <template if:true={message.replyToPreview}>
                                <span class="slds-text-color_weak"> : {message.replyToPreview} </span>
                              </template>
                              <span class="slds-text-color_weak slds-m-left_xx-small">
                                ({message.replyToFormattedDate})
                              </span>
                            </span>
                          </div>
                          <a
                            href="javascript:void(0);"
                            class="slds-text-link"
                            data-message-id={message.replyToMessageId}
                            onclick={handleNavigateToOriginalMessage}
                            title="Go to original message"
                          >
                            View original
                          </a>
                        </div>
                      </div>
                    </div>
                  </template>

                  <hr class="message-separator" />

                  <!-- Message Body / Edit Mode -->
                  <template if:false={message.isEditing}>
                    <div class="message-body">
                      <lightning-formatted-rich-text value={message.body}> </lightning-formatted-rich-text>
                    </div>
                    <template if:true={message.hasAttachments}>
                      <div class="message-attachments slds-m-top_small">
                        <c-portal-file-attachments
                          files={message.attachmentFiles}
                          show-preview={messageAttachmentShowPreview}
                          show-download={messageAttachmentShowDownload}
                          show-delete={messageAttachmentShowDelete}
                        >
                        </c-portal-file-attachments>
                      </div>
                    </template>
                  </template>

                  <template if:true={message.isEditing}>
                    <div class="message-edit">
                      <lightning-input-rich-text
                        value={_editingMessageBody}
                        onchange={handleEditBodyChange}
                        placeholder="Edit your message..."
                      >
                      </lightning-input-rich-text>
                      <div class="slds-m-top_small">
                        <lightning-button-group>
                          <lightning-button variant="brand" label="Save" onclick={handleSaveEdit}> </lightning-button>
                          <lightning-button variant="neutral" label="Cancel" onclick={handleCancelEdit}>
                          </lightning-button>
                        </lightning-button-group>
                      </div>
                    </div>
                  </template>

                  <hr class="message-separator" />

                  <!-- Context hierarchy -->
                  <template if:true={message.accountName}>
                    <template if:true={showAccountContext}>
                      <div class="message-related">
                        <lightning-icon icon-name="utility:account" size="xx-small"> </lightning-icon>
                        <span class="slds-text-body_small"> Account: {message.accountName} </span>
                      </div>
                    </template>
                  </template>

                  <template if:true={message.relatedProjectName}>
                    <template if:true={showProjectContext}>
                      <div class="message-related">
                        <lightning-icon icon-name="utility:record" size="xx-small"> </lightning-icon>
                        <template if:true={message.projectLink}>
                          <template if:true={message.projectLinkIsSalesforce}>
                            <span class="slds-text-body_small">
                              <a
                                href="javascript:void(0);"
                                class="slds-text-link"
                                data-link={message.projectNavData}
                                onclick={handleNavigateToRecord}
                              >
                                Project: {message.relatedProjectName}
                              </a>
                            </span>
                          </template>
                          <template if:false={message.projectLinkIsSalesforce}>
                            <span class="slds-text-body_small">
                              <a href={message.projectLink.href} class="slds-text-link">
                                Project: {message.relatedProjectName}
                              </a>
                            </span>
                          </template>
                        </template>
                        <template if:false={message.projectLink}>
                          <span class="slds-text-body_small"> Project: {message.relatedProjectName} </span>
                        </template>
                      </div>
                    </template>
                  </template>

                  <template if:true={message.relatedTaskName}>
                    <template if:true={showTaskContext}>
                      <template if:true={message.showTaskFooter}>
                        <div class="message-related">
                          <lightning-icon icon-name="utility:task" size="xx-small"> </lightning-icon>
                          <template if:true={message.taskLink}>
                            <template if:true={message.taskLinkIsSalesforce}>
                              <span class="slds-text-body_small">
                                <a
                                  href="javascript:void(0);"
                                  class="slds-text-link"
                                  data-link={message.taskNavData}
                                  onclick={handleNavigateToRecord}
                                >
                                  Task: {message.relatedTaskName}
                                </a>
                              </span>
                            </template>
                            <template if:false={message.taskLinkIsSalesforce}>
                              <span class="slds-text-body_small">
                                <a href={message.taskLink.href} class="slds-text-link">
                                  Task: {message.relatedTaskName}
                                </a>
                              </span>
                            </template>
                          </template>
                          <template if:false={message.taskLink}>
                            <span class="slds-text-body_small"> Task: {message.relatedTaskName} </span>
                          </template>
                        </div>
                      </template>
                    </template>
                  </template>
                </div>
              </template>
            </template>

            <template if:false={hasFilteredMessages}>
              <div class="slds-text-align_center slds-p-around_medium">
                <lightning-icon icon-name="utility:search" size="small" class="slds-m-bottom_x-small"> </lightning-icon>
                <p class="slds-text-body_small slds-text-color_weak">
                  No messages found matching "{messageSearchTerm}"
                </p>
              </div>
            </template>
          </template>

          <template if:false={hasMessages}>
            <div class="slds-text-align_center slds-p-around_medium">
              <lightning-icon icon-name="utility:message" size="small" class="slds-m-bottom_x-small"> </lightning-icon>
              <p class="slds-text-body_small slds-text-color_weak">No messages yet</p>
            </div>
          </template>
        </div>

        <!-- Message Composition Button -->
        <div class="message-compose-button">
          <lightning-button
            variant="brand"
            label="New Message"
            icon-name="utility:add"
            onclick={handleOpenModal}
            class="slds-m-top_small"
          >
          </lightning-button>
        </div>

        <!-- Message Composition Modal -->
        <template if:true={isModalOpen}>
          <section
            role="dialog"
            tabindex="-1"
            class="slds-modal slds-fade-in-open slds-modal_large"
            aria-labelledby="message-modal-heading"
            aria-modal="true"
            onclick={handleBackdropClick}
          >
            <div class="slds-modal__container message-modal-container">
              <header class="slds-modal__header">
                <button
                  class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                  title="Close"
                  onclick={handleCloseModal}
                >
                  <lightning-icon icon-name="utility:close" alternative-text="close" size="small"> </lightning-icon>
                  <span class="slds-assistive-text">Close</span>
                </button>
                <h2 id="message-modal-heading" class="slds-modal__title slds-hyphenate">
                  <template if:true={isReplying}> Reply to Message </template>
                  <template if:false={isReplying}> New Message </template>
                </h2>
              </header>

              <div class="slds-modal__content slds-p-around_medium" id="message-modal-content">
                <!-- Reply Indicator -->
                <template if:true={isReplying}>
                  <div class="reply-indicator slds-m-bottom_medium">
                    <div class="slds-box slds-box_x-small slds-theme_info">
                      <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                        <div class="slds-col">
                          <lightning-icon icon-name="utility:reply" size="x-small" class="slds-m-right_x-small">
                          </lightning-icon>
                          <span class="slds-text-body_small">
                            Replying to
                            <strong>{replyingToMessage.displaySenderName}</strong>
                            <template if:true={replyingToMessage.replyToPreview}>
                              <span class="slds-text-color_weak"> : {replyingToMessage.replyToPreview} </span>
                            </template>
                          </span>
                        </div>
                        <lightning-button-icon
                          icon-name="utility:close"
                          variant="border-filled"
                          alternative-text="Cancel reply"
                          title="Cancel reply"
                          onclick={handleCancelReply}
                          class="slds-m-left_small"
                        >
                        </lightning-button-icon>
                      </div>
                    </div>
                  </div>
                </template>

                <!-- Message Body -->
                <div class="slds-form-element slds-m-bottom_medium">
                  <label class="slds-form-element__label" for="message-body-modal">
                    <abbr class="slds-required" title="required">*</abbr>
                    Message
                  </label>
                  <div class="slds-form-element__control">
                    <lightning-input-rich-text
                      value={messageBody}
                      onchange={handleMessageBodyChange}
                      placeholder="Type your message here..."
                      class="message-rich-text-large"
                    >
                    </lightning-input-rich-text>
                  </div>
                </div>

                <!-- Visible To (Salesforce / Milestone team only) -->
                <template if:true={showRecipientTypeSelector}>
                  <div class="slds-form-element slds-m-bottom_medium">
                    <div class="slds-form-element__control">
                      <lightning-combobox
                        name="recipientType"
                        label="Visible To"
                        value={recipientType}
                        options={recipientTypeOptions}
                        field-level-help={recipientTypeFieldHelp}
                        onchange={handleRecipientTypeChange}
                        placeholder="Select who can see this message"
                        required
                      >
                      </lightning-combobox>
                    </div>
                  </div>
                </template>

                <!-- File Upload -->
                <div class="slds-form-element slds-m-bottom_medium">
                  <template if:true={renderFileUpload}>
                    <lightning-file-upload
                      label="Attach Files"
                      name="fileUpload"
                      accept={acceptedFormats}
                      field-level-help={composerFileUploadHelp}
                      onuploadfinished={handleUploadFinished}
                      multiple
                    >
                    </lightning-file-upload>
                  </template>
                  <template if:true={hasPendingComposerFiles}>
                    <div class="slds-m-top_small">
                      <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small">Files to send</div>
                      <c-portal-file-attachments
                        files={pendingComposerFiles}
                        show-preview={composerAttachmentShowPreview}
                        show-download={composerAttachmentShowDownload}
                        show-delete={composerAttachmentShowDelete}
                        onfileremove={handlePendingFileRemove}
                      >
                      </c-portal-file-attachments>
                    </div>
                  </template>
                </div>
              </div>

              <footer class="slds-modal__footer">
                <lightning-button-group>
                  <lightning-button variant="neutral" label="Cancel" onclick={handleCloseModal}> </lightning-button>
                  <lightning-button variant="brand" label="Send Message" onclick={handleSendMessage}>
                  </lightning-button>
                </lightning-button-group>
              </footer>
            </div>
          </section>
          <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
      </div>
    </lightning-card>
  </template>
</template>
