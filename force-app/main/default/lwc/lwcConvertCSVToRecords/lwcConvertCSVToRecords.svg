<svg id="lwcConvertCSVToRecords" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1589ee"/>
  
  <!-- Document/File icon -->
  <rect x="30" y="20" width="40" height="50" rx="2" fill="#ffffff"/>
  
  <!-- CSV grid lines representing data -->
  <line x1="35" y1="35" x2="65" y2="35" stroke="#1589ee" stroke-width="1.5" fill="none"/>
  <line x1="35" y1="42" x2="65" y2="42" stroke="#1589ee" stroke-width="1.5" fill="none"/>
  <line x1="35" y1="49" x2="65" y2="49" stroke="#1589ee" stroke-width="1.5" fill="none"/>
  <line x1="35" y1="56" x2="65" y2="56" stroke="#1589ee" stroke-width="1.5" fill="none"/>
  
  <!-- Vertical grid lines -->
  <line x1="45" y1="30" x2="45" y2="60" stroke="#1589ee" stroke-width="1.5" fill="none"/>
  <line x1="55" y1="30" x2="55" y2="60" stroke="#1589ee" stroke-width="1.5" fill="none"/>
  
  <!-- Arrow pointing to records/database -->
  <path d="M 50 75 L 50 85 M 50 85 L 45 80 M 50 85 L 55 80" stroke="#16325c" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Database/Records icon at bottom -->
  <ellipse cx="50" cy="92" rx="8" ry="3" fill="#16325c"/>
  <rect x="42" y="88" width="16" height="6" rx="3" fill="#16325c"/>
</svg>