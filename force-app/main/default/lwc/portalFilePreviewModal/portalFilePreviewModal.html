<template>
  <lightning-modal-header label={headerLabel}></lightning-modal-header>
  <lightning-modal-body>
    <template if:true={loading}>
      <div class="portal-file-preview-state">
        <lightning-spinner alternative-text="Loading preview" size="medium"></lightning-spinner>
        <p class="slds-text-body_small slds-m-top_small slds-text-color_weak">Loading preview…</p>
      </div>
    </template>
    <template if:true={loadError}>
      <p class="slds-text-body_regular">{errorMessage}</p>
    </template>
    <template if:true={showIframe}>
      <iframe src={iframeSrc} class="portal-file-preview-iframe" title={headerLabel}></iframe>
    </template>
  </lightning-modal-body>
  <lightning-modal-footer>
    <lightning-button
      class="slds-m-right_x-small"
      variant="neutral"
      label="Open in new tab"
      title="Open in new tab"
      onclick={handleOpenNewTab}
      disabled={openInNewTabDisabled}
    >
    </lightning-button>
    <lightning-button variant="brand" label="Close" title="Close" onclick={handleClose}> </lightning-button>
  </lightning-modal-footer>
</template>
